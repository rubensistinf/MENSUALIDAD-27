<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aporte Anual - UE 27 de Mayo</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFA500">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aportes 27">
    <link rel="apple-touch-icon" href="images/logo.png">
    <!-- Open Graph (previa al compartir) -->
    <meta property="og:title" content="Aporte Anual - UE 27 de Mayo">
    <meta property="og:description" content="Sistema de gestión de pagos de aportes. Registra cobros, genera recibos y consulta el estado de todos los estudiantes inscritos.">
    <meta property="og:image" content="https://mensualidad-27.onrender.com/images/logo.png">
    <meta property="og:url" content="https://mensualidad-27.onrender.com">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #111, #2a2a2a);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        .logo-box {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-box img {
            width: 80px;
            margin-bottom: 1rem;
        }
        .logo-box h1 {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(to right, var(--primary-color), var(--gold-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-msg {
            color: #ff4444;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
            background: rgba(255,0,0,0.1);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-box">
            <img src="images/logo.png" alt="Logo UE 27 de Mayo" onerror="this.src='https://via.placeholder.com/80?text=Logo'">
            <h1>Aporte Anual</h1>
            <p style="color: #aaa;">Gestión de Aportes</p>
        </div>
        
        <div class="glass-panel">
            <div class="error-msg" id="errorMsg"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" id="username" class="form-control" placeholder="Ingrese su usuario" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="btnLogin">
                    Entrar al Sistema <i class="fas fa-sign-in-alt"></i>
                </button>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="#" id="linkOlvidaste" style="color: #aaa; text-decoration: none; font-size: 0.9rem;">¿Olvidaste tu contraseña?</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Recuperar Contraseña -->
    <div id="modalReset" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div class="glass-panel" style="width: 90%; max-width: 400px; position: relative;">
            <button id="btnCloseModal" style="position: absolute; right: 15px; top: 15px; background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer;"><i class="fas fa-times"></i></button>
            <h3 style="color: var(--gold-color); margin-top: 0;"><i class="fas fa-key"></i> Recuperar Acceso</h3>
            <p style="color: #ccc; font-size: 0.9rem; margin-bottom: 1rem;">Ingrese su usuario y el correo institucional asignado para restablecer su contraseña a la inicial del sistema.</p>
            
            <div class="error-msg" id="resetErrorMsg" style="margin-bottom: 1rem;"></div>
            <div style="display: none; padding: 12px; background: rgba(0,176,80,0.15); border: 1px solid #00B050; color: #00B050; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem;" id="resetSuccessMsg"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label>Usuario (ej. admin o secretaria)</label>
                    <input type="text" id="resetUsername" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Correo Institucional</label>
                    <input type="email" id="resetEmail" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" id="btnReset">
                    Restablecer Contraseña
                </button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
    <script src="instalar/pwa.js"></script>
</body>
</html>
