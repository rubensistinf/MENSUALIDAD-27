<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UE 27 de Mayo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #111, #2a2a2a);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        .logo-box {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-box img {
            width: 80px;
            margin-bottom: 1rem;
        }
        .logo-box h1 {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(to right, var(--primary-color), var(--gold-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-msg {
            color: #ff4444;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
            background: rgba(255,0,0,0.1);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-box">
            <img src="../logo.png" alt="Logo UE 27 de Mayo" onerror="this.src='https://via.placeholder.com/80?text=Logo'">
            <h1>Sistema PRO</h1>
            <p style="color: #aaa;">Gestión de Mensualidades</p>
        </div>
        
        <div class="glass-panel">
            <div class="error-msg" id="errorMsg"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" id="username" class="form-control" placeholder="Ingrese su usuario" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="btnLogin">
                    Entrar al Sistema <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
